    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    
    <header>
        <div class="navbar bg-base-100 shadow-sm h-auto">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl"><img src="./assets/github-logo.png" alt="" class=" w-8">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input id="searchInput" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <div class="dropdown dropdown-end">
                <div class="w-full rounded">
          <button class="btn btn-primary">+New Issue</button>
        </div>
      </div>
    
    </div>  
  </div>
</div>
</header>

<main class="w-10/12 mx-auto">

  <section class="gap-10  mt-24 p-4 shadow-sm shadow-gray-300  bg-white">
    <button id="allBtn" class="btn px-8 btn-primary">All</button>
    <button id="openBtn" class="btn px-8 ">Open</button>
    <button id="closedBtn" class="btn px-8 ">Closed</button>
  </section>
  <section>
    <div class="flex justify-between bg-white shadow-sm shadow-gray-400 p-4 items-center mt-4">
      <div class="flex justify-between gap-5 ">
        <img class="w-15 h-15 border border-10 border-gray-200 rounded-full" src="./assets/Aperture.png" alt="">
        <div class="">
          <h1 class="text-3xl font-bold">50 Issues</h1>
          <p class="text-gray-600 w-4xl">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex gap-2">
        <div>
          <p><span class="inline-block w-3 h-3 bg-green-500 rounded-full"> </span> Open</p>
        </div>
        <div>
          <p><span class="inline-block w-3 h-3 bg-purple-500 rounded-full"> </span> Closed</p>
        </div>
      </div>
    </div>
  
    <div class="bg-gray-50 p-2 grid md:grid-cols-2 lg:grid-cols-4 gap-4" id="issue-container">
