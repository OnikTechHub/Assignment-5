<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- DaysiUI and Tailwind link -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- Google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- csslink -->
    <link rel="stylesheet" href="./style.css">

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
</head>
<body>

    <main class="flex justify-center  my-24  ">
    <fieldset class="fieldset  border-base-300 rounded-box w-xs border p-4 shadow ">
 
        <div class="flex flex-col  text-center items-center">
            <img class="h-[100px] w-[100px] justify-center" src="./assets/github-logo.png" alt="">
            <h1 class="font-bold text-2xl ">GitHub Issues Tracker</h1>
            <p class="text-gray-500">Sign in to manage your issues</p>
        </div>

        <label class="label text-black text-sm">Username</label>
        <input type="text" id="userInput" placeholder="Enter Username" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <p class="text-xs text-indigo-600 mt-1">Default: admin</p>

        <label class="label text-black text-sm">Password</label>
        <input type="password" id="passInput" placeholder="Enter Password" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        <p class="text-xs text-indigo-600 mt-1">Default: admin123</p>

        <button class="btn btn-primary mt-4">Sign In</button>

        <div class="mt-8 border-t pt-6 text-center items-center">
            <p class="text-gray-400 text-sm mb-1 italic">OR</p>
            <div class="bg-gray-50 p-4 rounded-lg">
                <p class="text-xs text-gray-500 mb-2">Demo Credentials:</p>
                <p class="text-sm"><strong>Username:</strong> admin</p>
                <p class="text-sm"><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </fieldset>

    

</main>

</body>
</html>
